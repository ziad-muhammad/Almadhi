<!DOCTYPE html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">

<link rel="icon" type="image/png" href="icon-512.png">

<title>Cheque Register — View Only</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #e7edf6;
  --surface:   #ffffff;
  --surface2:  #f5f8fc;
  --border:    rgba(15,40,80,.11);
  --border2:   rgba(15,40,80,.18);
  --hdr-bg:    #0a1f3d;
  --hdr-bg2:   #123156;
  --gold:      #c69320;
  --gold2:     #dcae35;
  --gold3:     #f2cf63;
  --gold-lt:   rgba(220,174,53,.15);
  --green:     #0fa968;
  --green-lt:  rgba(15,169,104,.11);
  --red:       #e23b4b;
  --red-lt:    rgba(226,59,75,.10);
  --amber:     #d9860a;
  --amber-lt:  rgba(217,134,10,.12);
  --t1: #0e1b2e;
  --t2: #43536b;
  --t3: #7d8a9e;
  --font: 'Plus Jakarta Sans', sans-serif;
  --radius: 11px;
  --radius-lg: 16px;
  --shadow: 0 1px 3px rgba(15,35,70,.08), 0 8px 24px rgba(15,35,70,.11);
}
body.dark {
  --bg: #091120; --surface: #0f1c30; --surface2: #152439;
  --border: rgba(220,174,53,.13); --border2: rgba(220,174,53,.21);
  --t1: #eaf0f8; --t2: #a7b4c8; --t3: #6f7d92;
  --green-lt: rgba(15,169,104,.15); --red-lt: rgba(226,59,75,.15); --amber-lt: rgba(217,134,10,.18);
}
* { box-sizing: border-box; }
html,body { margin:0; padding:0; }
body {
  font-family: var(--font); background: var(--bg); color: var(--t1);
  -webkit-tap-highlight-color: transparent; min-height: 100vh;
  padding-bottom: 24px;
}
header.topbar {
  background: linear-gradient(135deg, var(--hdr-bg) 0%, var(--hdr-bg2) 100%);
  padding: 14px 16px; display:flex; align-items:center; justify-content:space-between; gap:10px;
  position: sticky; top:0; z-index: 50; box-shadow: 0 4px 18px rgba(0,0,0,.18);
  border-bottom: 2px solid var(--gold2);
}
.tb-left { display:flex; align-items:center; gap:10px; min-width:0; }
.tb-shield { flex-shrink:0; width:34px; height:34px; }
.tb-title { color:#fff; font-weight:800; font-size:15px; line-height:1.2; }
.tb-sub { display:flex; align-items:center; gap:5px; margin-top:1px; }
.tb-dot { width:6px; height:6px; border-radius:50%; background:var(--green); box-shadow:0 0 0 0 rgba(15,169,104,.6); animation: pulse 2s infinite; }
@keyframes pulse { 0%{box-shadow:0 0 0 0 rgba(15,169,104,.55);} 70%{box-shadow:0 0 0 6px rgba(15,169,104,0);} 100%{box-shadow:0 0 0 0 rgba(15,169,104,0);} }
.tb-sub-text { color: var(--gold3); font-size: 10.5px; font-weight:700; letter-spacing:.4px; text-transform:uppercase; }
.tb-right { display:flex; align-items:center; gap:8px; flex-shrink:0; }
.theme-btn { background: rgba(255,255,255,.09); border:none; border-radius:8px; width:34px; height:34px; color:#fff; cursor:pointer; display:flex; align-items:center; justify-content:center; }

.wrap { max-width: 1200px; margin: 0 auto; padding: 14px; }

.card { background: var(--surface); border-radius: var(--radius-lg); border:1px solid var(--border); box-shadow: var(--shadow); }
.filter-card { padding: 16px 18px; margin-bottom: 14px; }
.form-row { display:flex; gap:14px; flex-wrap:wrap; align-items:flex-end; }
.form-group { flex:1 1 200px; min-width: 160px; margin-bottom:0; }
.form-group label { display:block; font-size:10.5px; font-weight:700; letter-spacing:.5px; text-transform:uppercase; color: var(--t3); margin-bottom:5px; }
.form-group input, .form-group select {
  width:100%; height:42px; padding:0 12px; border-radius: 9px; border:1.5px solid var(--border2);
  background: var(--surface2); color: var(--t1); font-family: var(--font); font-size:14px; outline:none;
}
.form-group input:focus, .form-group select:focus { border-color: var(--gold2); }
.btn { display:inline-flex; align-items:center; gap:6px; height:42px; padding:0 14px; border-radius:9px; border:1.5px solid var(--border2);
  background: var(--surface2); color: var(--t1); font-family: var(--font); font-weight:700; font-size:13px; cursor:pointer; white-space:nowrap; }
.btn:hover { background: var(--gold-lt); border-color: var(--gold2); }

.chip-row { display:flex; gap:8px; flex-wrap:wrap; margin-top:12px; }
.chip { border:1.5px solid var(--border2); background:var(--surface2); color:var(--t2); font-family:var(--font);
  font-weight:700; font-size:12.5px; padding:8px 14px; border-radius:20px; cursor:pointer; }
.chip.sm { padding:6px 12px; font-size:12px; }
.chip.active { background: var(--gold2); border-color: var(--gold2); color:#1a1200; }
.seg { display:inline-flex; border:1.5px solid var(--border2); border-radius:20px; overflow:hidden; }
.seg button { border:none; background:var(--surface2); color:var(--t2); font-family:var(--font); font-weight:700; font-size:12.5px; padding:8px 16px; cursor:pointer; }
.seg button.active { background: var(--hdr-bg); color:#fff; }
.day-hint { font-size:10.5px; color:var(--t3); font-weight:700; text-transform:uppercase; letter-spacing:.4px; }

.summary-bar { background: linear-gradient(135deg,var(--hdr-bg) 0%, var(--hdr-bg2) 100%); border-radius: var(--radius-lg);
  padding: 9px 12px; margin-bottom:14px; }
.summary-top { display:flex; align-items:baseline; justify-content:space-between; gap:8px; flex-wrap:wrap; }
.summary-label { color: rgba(255,255,255,.6); font-size:9px; font-weight:700; letter-spacing:.5px; text-transform:uppercase; }
.summary-total { color:#fff; font-size:15px; font-weight:800; }
.summary-count { color: var(--gold3); font-size:10px; font-weight:700; }
.summary-split { display:flex; gap:6px; margin-top:6px; }
.summary-box { flex:1; min-width:0; background:rgba(255,255,255,.08); border:1px solid transparent; border-radius:7px;
  padding:5px 9px; cursor:pointer; text-align:left; font-family:inherit; -webkit-tap-highlight-color:transparent; }
.summary-box-label { color:rgba(255,255,255,.5); font-size:8px; font-weight:700; text-transform:uppercase; letter-spacing:.4px; }
.summary-box-row { display:flex; align-items:baseline; justify-content:space-between; gap:4px; margin-top:1px; }
.summary-box-total { font-size:11.5px; font-weight:800; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.summary-box-count { color:rgba(255,255,255,.5); font-size:8.5px; font-weight:600; white-space:nowrap; }
.summary-box.cleared .summary-box-total { color:#86efac; }
.summary-box.pending .summary-box-total { color:#fde68a; }
.summary-box.cleared.active { background:rgba(134,239,172,.20); border-color:#86efac; }
.summary-box.pending.active { background:rgba(253,230,138,.20); border-color:#fde68a; }

.tbl-wrap { border-radius: var(--radius-lg); border:1px solid var(--border); overflow:auto; background:var(--surface); box-shadow: var(--shadow); }
table { width:100%; border-collapse:collapse; font-size:13.5px; min-width: 760px; }
thead th { text-align:left; font-size:10.5px; text-transform:uppercase; letter-spacing:.5px; color:var(--t3); font-weight:800;
  padding:12px 14px; border-bottom:1.5px solid var(--border); background:var(--surface2); position:sticky; top:0; }
tbody td { padding:12px 14px; border-bottom:1px solid var(--border); vertical-align:middle; }
tbody tr:last-child td { border-bottom:none; }
tbody tr:hover { background: var(--surface2); }
.mono { font-variant-numeric: tabular-nums; }
.fw-700 { font-weight:700; }
.badge { display:inline-flex; padding:4px 10px; border-radius:20px; font-size:11.5px; font-weight:700; border:1px solid transparent; }
.aed-sym { height:0.78em; width:auto; vertical-align:middle; position:relative; top:-0.04em; display:inline-block; fill:currentColor; }

.empty-state { text-align:center; padding:50px 20px; color:var(--t3); }
.empty-state svg { opacity:.35; margin-bottom:10px; }

.footer-note { text-align:center; color:var(--t3); font-size:11.5px; margin-top:18px; padding: 0 20px; line-height:1.6; }

@media (max-width: 640px) {
  table { min-width: 640px; }
  .summary-total { font-size:14px; }
}
</style>
</head>
<body>

<header class="topbar">
  <div class="tb-left">
    <svg class="tb-shield" viewBox="0 0 24 24" fill="none" stroke="#dcae35" stroke-width="1.6"><path d="M12 2 4 5v6c0 5 3.4 8.7 8 10 4.6-1.3 8-5 8-10V5l-8-3Z" fill="rgba(220,174,53,.12)"/><path d="M8 12h8M8 9h8M8 15h5"/></svg>
    <div>
      <div class="tb-title">Cheque Register</div>
      <div class="tb-sub"><span class="tb-dot"></span><span class="tb-sub-text" id="sync-label">Live · View Only</span></div>
    </div>
  </div>
  <div class="tb-right">
    <button class="theme-btn" onclick="toggleTheme()" title="Toggle dark mode">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
  </div>
</header>

<div class="wrap">

  <div class="card filter-card">
    <div class="form-row">
      <div class="form-group" style="flex:2 1 220px">
        <label>Search</label>
        <input type="text" id="v-search" placeholder="Party, cheque no., note…" oninput="renderAll()">
      </div>
      <div class="form-group" style="flex:0 0 150px">
        <label>Status</label>
        <select id="v-status" onchange="renderAll()">
          <option value="all">All</option>
          <option value="pending">Pending</option>
          <option value="cleared">Cleared</option>
        </select>
      </div>
      <button class="btn" onclick="clearFilters()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg> Clear
      </button>
    </div>

    <div class="chip-row" id="range-chips">
      <button class="chip" data-s="all" onclick="setShortcut('all')">All Time</button>
      <button class="chip" data-s="lastmonth" onclick="setShortcut('lastmonth')">Last Month</button>
      <button class="chip" data-s="thismonth" onclick="setShortcut('thismonth')">This Month</button>
      <button class="chip" data-s="nextmonth" onclick="setShortcut('nextmonth')">Next Month</button>
      <button class="chip" data-s="twomonths" onclick="setShortcut('twomonths')">2 Months After</button>
      <button class="chip" data-s="custom" onclick="setShortcut('custom')">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:3px"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Custom
      </button>
    </div>

    <div id="custom-range-wrap" style="display:none;gap:14px;margin-top:10px;flex-wrap:wrap">
      <div class="form-group" style="flex:0 0 160px"><label>From</label><input type="date" id="v-from" onchange="renderAll()"></div>
      <div class="form-group" style="flex:0 0 160px"><label>To</label><input type="date" id="v-to" onchange="renderAll()"></div>
    </div>

    <div style="display:flex;align-items:center;gap:10px;margin-top:14px;flex-wrap:wrap">
      <div class="seg" id="day-direction">
        <button class="active" data-d="upcoming" onclick="setDayDirection('upcoming')">Upcoming</button>
        <button data-d="past" onclick="setDayDirection('past')">Past</button>
      </div>
      <span class="day-hint">Day shortcuts →</span>
    </div>
    <div class="chip-row" id="day-chips">
      <button class="chip sm" data-s="d1" onclick="setShortcut('d1')">1d</button>
      <button class="chip sm" data-s="d2" onclick="setShortcut('d2')">2d</button>
      <button class="chip sm" data-s="d3" onclick="setShortcut('d3')">3d</button>
      <button class="chip sm" data-s="d4" onclick="setShortcut('d4')">4d</button>
      <button class="chip sm" data-s="d5" onclick="setShortcut('d5')">5d</button>
      <button class="chip sm" data-s="d6" onclick="setShortcut('d6')">6d</button>
      <button class="chip sm" data-s="d7" onclick="setShortcut('d7')">7d</button>
      <button class="chip sm" data-s="d15" onclick="setShortcut('d15')">15d</button>
    </div>
  </div>

  <div class="summary-bar">
    <div class="summary-top">
      <div class="summary-label" id="summary-label">This Month</div>
      <div style="display:flex;align-items:baseline;gap:6px">
        <span class="summary-total" id="summary-total">0.00</span>
        <span class="summary-count" id="summary-count">0 cheques</span>
      </div>
    </div>
    <div class="summary-split">
      <button type="button" class="summary-box cleared" id="summary-cleared-box" onclick="filterByStatus('cleared')">
        <div class="summary-box-label">Cleared</div>
        <div class="summary-box-row">
          <span class="summary-box-total" id="summary-cleared-total">0.00</span>
          <span class="summary-box-count" id="summary-cleared-count">0</span>
        </div>
      </button>
      <button type="button" class="summary-box pending" id="summary-pending-box" onclick="filterByStatus('pending')">
        <div class="summary-box-label">Pending</div>
        <div class="summary-box-row">
          <span class="summary-box-total" id="summary-pending-total">0.00</span>
          <span class="summary-box-count" id="summary-pending-count">0</span>
        </div>
      </button>
    </div>
  </div>

  <div class="tbl-wrap">
    <table>
      <thead><tr><th>#</th><th>Date</th><th>Party</th><th>Cheque No.</th><th>Amount (AED)</th><th>Note</th><th>Status</th></tr></thead>
      <tbody id="table-body"></tbody>
    </table>
  </div>

  <div class="footer-note">View only — data entered and updated from the main Cheque Register app. Updates here appear automatically, in real time.</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

// Same Firebase project as the main Al Madhi app — this file only ever reads.
// No set/update/remove is imported or used anywhere in this app.
const firebaseConfig = {
  apiKey: "AIzaSyAnkBfzZQN_CzbB9QoZrhhOLb3mABJzxK8",
  authDomain: "al-madhi-ledger.firebaseapp.com",
  databaseURL: "https://al-madhi-ledger-default-rtdb.firebaseio.com",
  projectId: "al-madhi-ledger",
  storageBucket: "al-madhi-ledger.firebasestorage.app",
  messagingSenderId: "861977492810",
  appId: "1:861977492810:web:8c35d0c82c1011317e95b3"
};
const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

window._cheques = [];

// Offline support: show the last-synced data immediately on load (from
// localStorage) instead of a blank "0 cheques" screen, then swap in live
// data as soon as Firebase responds. Every live update refreshes the cache.
const CACHE_KEY = 'chqviewer_cache_v1';
try {
  const cached = JSON.parse(localStorage.getItem(CACHE_KEY) || 'null');
  if(cached && Array.isArray(cached.cheques)) {
    window._cheques = cached.cheques;
    document.getElementById('sync-label').textContent = cached.at ? `Cached · ${new Date(cached.at).toLocaleString('en-GB',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'})}` : 'Cached · Offline';
    window.renderAll();
  }
} catch(e) {}

onValue(ref(db, 'almadhi/cheques'), snap => {
  const data = snap.val();
  window._cheques = data ? Object.values(data) : [];
  document.getElementById('sync-label').textContent = 'Live · View Only';
  window.renderAll();
  try { localStorage.setItem(CACHE_KEY, JSON.stringify({ cheques: window._cheques, at: Date.now() })); } catch(e) {}
}, err => {
  document.getElementById('sync-label').textContent = window._cheques.length ? 'Offline · Showing Cached Data' : 'Connection error';
  console.error(err);
});
</script>

let shortcut = 'thismonth';
let dayDirection = 'upcoming';

function esc(s) { return (s==null?'':String(s)).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
function fmt(n) { return Number(n||0).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2}); }
function today() { return new Date().toISOString().split('T')[0]; }
function fmtDate(d) {
  if(!d) return '—';
  const dt = new Date(d+'T00:00:00');
  if(isNaN(dt)) return d;
  return dt.toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' });
}

function getRange() {
  const now = new Date(); now.setHours(0,0,0,0);
  if(shortcut==='thismonth')  return { start: new Date(now.getFullYear(), now.getMonth(), 1), end: new Date(now.getFullYear(), now.getMonth()+1, 0, 23,59,59) };
  if(shortcut==='lastmonth')  return { start: new Date(now.getFullYear(), now.getMonth()-1, 1), end: new Date(now.getFullYear(), now.getMonth(), 0, 23,59,59) };
  if(shortcut==='nextmonth')  return { start: new Date(now.getFullYear(), now.getMonth()+1, 1), end: new Date(now.getFullYear(), now.getMonth()+2, 0, 23,59,59) };
  if(shortcut==='twomonths')  return { start: new Date(now.getFullYear(), now.getMonth()+2, 1), end: new Date(now.getFullYear(), now.getMonth()+3, 0, 23,59,59) };
  if(shortcut==='custom') {
    const from = document.getElementById('v-from')?.value;
    const to   = document.getElementById('v-to')?.value;
    if(from && to) return { start: new Date(from+'T00:00:00'), end: new Date(to+'T23:59:59') };
    return null;
  }
  const dayMatch = /^d(\d+)$/.exec(shortcut||'');
  if(dayMatch) {
    const n = parseInt(dayMatch[1], 10);
    if(dayDirection==='past') { const start = new Date(now); start.setDate(start.getDate()-n); return { start, end: new Date(now.getFullYear(), now.getMonth(), now.getDate(), 23,59,59) }; }
    const end = new Date(now); end.setDate(end.getDate()+n); end.setHours(23,59,59,999);
    return { start: now, end };
  }
  return null; // 'all'
}
function rangeLabel() {
  const labels = { all:'All Time', lastmonth:'Last Month', thismonth:'This Month', nextmonth:'Next Month', twomonths:'2 Months After', custom:'Custom Range' };
  const dayMatch = /^d(\d+)$/.exec(shortcut||'');
  if(dayMatch) return `${dayDirection==='past'?'Past':'Next'} ${dayMatch[1]} Days`;
  return labels[shortcut] || 'All Time';
}

function updateChipStates() {
  document.querySelectorAll('#range-chips .chip, #day-chips .chip').forEach(b => b.classList.toggle('active', b.dataset.s===shortcut));
  document.querySelectorAll('#day-direction button').forEach(b => b.classList.toggle('active', b.dataset.d===dayDirection));
  document.getElementById('custom-range-wrap').style.display = shortcut==='custom' ? 'flex' : 'none';
}

function setShortcut(s) { shortcut = s; updateChipStates(); renderAll(); }
function setDayDirection(d) { dayDirection = d; updateChipStates(); renderAll(); }

function clearFilters() {
  document.getElementById('v-search').value = '';
  document.getElementById('v-status').value = 'all';
  document.getElementById('v-from').value = '';
  document.getElementById('v-to').value = '';
  shortcut = 'thismonth';
  dayDirection = 'upcoming';
  updateChipStates();
  renderAll();
}

function getFiltered() {
  let list = [...(window._cheques||[])];
  const kw = (document.getElementById('v-search')?.value || '').trim().toLowerCase();
  const status = document.getElementById('v-status')?.value || 'all';

  if(kw) list = list.filter(c =>
    (c.party||'').toLowerCase().includes(kw) ||
    (c.chequeNo||'').toLowerCase().includes(kw) ||
    (c.note||'').toLowerCase().includes(kw)
  );
  if(status==='pending') list = list.filter(c => !c.cleared);
  if(status==='cleared') list = list.filter(c => c.cleared);

  const range = getRange();
  if(range) list = list.filter(c => { const d = new Date(c.date+'T00:00:00'); return d >= range.start && d <= range.end; });

  return list.sort((a,b) => (a.date||'').localeCompare(b.date||''));
}

// Same range + search as getFiltered(), but ignoring the status dropdown — this is
// what powers the Cleared/Pending split in the summary bar so it always covers every
// party and status within the selected date range.
function getRangeFiltered() {
  let list = [...(window._cheques||[])];
  const kw = (document.getElementById('v-search')?.value || '').trim().toLowerCase();
  if(kw) list = list.filter(c =>
    (c.party||'').toLowerCase().includes(kw) ||
    (c.chequeNo||'').toLowerCase().includes(kw) ||
    (c.note||'').toLowerCase().includes(kw)
  );
  const range = getRange();
  if(range) list = list.filter(c => { const d = new Date(c.date+'T00:00:00'); return d >= range.start && d <= range.end; });
  return list;
}

function rowHTML(c, i) {
  const overdue = !c.cleared && c.date < today();
  const badge = c.cleared
    ? `<span class="badge" style="background:var(--green-lt);color:var(--green)">Cleared</span>`
    : overdue
      ? `<span class="badge" style="background:var(--red-lt);color:var(--red)">Overdue</span>`
      : `<span class="badge" style="background:var(--amber-lt);color:var(--amber)">Pending</span>`;
  return `<tr>
    <td style="color:var(--t3)">${i+1}</td>
    <td>${fmtDate(c.date)}</td>
    <td class="fw-700">${esc(c.party)}</td>
    <td class="mono">${esc(c.chequeNo||'—')}</td>
    <td class="mono fw-700">${AED} ${fmt(c.amount)}</td>
    <td style="color:var(--t2);font-size:12.5px">${esc(c.note||'—')}</td>
    <td>${badge}</td>
  </tr>`;
}

function renderAll() {
  const list = getFiltered();
  const tbody = document.getElementById('table-body');
  tbody.innerHTML = list.length
    ? list.map(rowHTML).join('')
    : `<tr><td colspan="7"><div class="empty-state">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/></svg>
        <div>No cheques match this filter</div>
       </div></td></tr>`;

  const parts = [rangeLabel()];
  const kw = (document.getElementById('v-search')?.value || '').trim();
  if(kw) parts.push(`"${kw}"`);

  // Top row: total for the whole range + search, regardless of status —
  // never skewed by which status box is currently active.
  const rangeList = getRangeFiltered();
  const rangeTotal = rangeList.reduce((s,c)=>s+Number(c.amount||0),0);
  const clearedList = rangeList.filter(c=>c.cleared);
  const pendingList = rangeList.filter(c=>!c.cleared);
  const clearedTotal = clearedList.reduce((s,c)=>s+Number(c.amount||0),0);
  const pendingTotal = pendingList.reduce((s,c)=>s+Number(c.amount||0),0);

  document.getElementById('summary-label').textContent = parts.join(' · ');
  document.getElementById('summary-total').innerHTML = `${AED} ${fmt(rangeTotal)}`;
  document.getElementById('summary-count').textContent = `${rangeList.length} cheque${rangeList.length!==1?'s':''}`;
  document.getElementById('summary-cleared-total').innerHTML = `${AED} ${fmt(clearedTotal)}`;
  document.getElementById('summary-cleared-count').textContent = `${clearedList.length} cheque${clearedList.length!==1?'s':''}`;
  document.getElementById('summary-pending-total').innerHTML = `${AED} ${fmt(pendingTotal)}`;
  document.getElementById('summary-pending-count').textContent = `${pendingList.length} cheque${pendingList.length!==1?'s':''}`;

  const activeStatus = document.getElementById('v-status')?.value || 'all';
  document.getElementById('summary-cleared-box').classList.toggle('active', activeStatus==='cleared');
  document.getElementById('summary-pending-box').classList.toggle('active', activeStatus==='pending');
}

// Tapping the Cleared or Pending box filters the table to just that status;
// tapping the already-active one clears the filter back to All.
function filterByStatus(status) {
  const sel = document.getElementById('v-status');
  if(!sel) return;
  sel.value = (sel.value === status) ? 'all' : status;
  renderAll();
}

function toggleTheme() {
  document.body.classList.toggle('dark');
  localStorage.setItem('chqviewer_theme', document.body.classList.contains('dark') ? 'dark' : 'light');
}
if(localStorage.getItem('chqviewer_theme') === 'dark') document.body.classList.add('dark');

updateChipStates();
window.renderAll = renderAll;
window.setShortcut = setShortcut;
window.setDayDirection = setDayDirection;
window.clearFilters = clearFilters;
window.toggleTheme = toggleTheme;
window.filterByStatus = filterByStatus;

if('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('sw.js?v=2').catch(function(){});
  });
}
</script>
